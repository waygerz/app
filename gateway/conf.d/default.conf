# waygerz gateway — TLS terminator + /api/* router.
#
# Modeled on the contentious gateway, but adapted to waygerz:
#   * Backend services are Flask on :8000 and serve at literal top-level
#     prefixes: /auth, /wallet, /friends, /events + /sports (ingestor), /wagers.
#   * Auth is a JWT verified locally by every service (shared JWT_SECRET_KEY),
#     so there is NO central auth_request/session subrequest here — the gateway
#     just forwards the Authorization header and the service validates it.
#   * The React SPA owns client-side routes /wallet, /friends, /events/:id that
#     collide with same-named API paths, so the whole API lives under /api/* and
#     the gateway strips the /api prefix before proxying (literal proxy_pass URI
#     substitution — NOT `rewrite ... break` with captures, which 500s).

# ---- Rate-limit zones (valid here: conf.d/*.conf is included inside http{}).
# The host is internet-reachable; without a cap an attacker could brute-force
# the (only 4-digit!) PINs unthrottled. Generous for a normal user's page
# fan-out, tight enough to knock an online attack down to ~30/sec globally and
# far less on the login route below.
limit_req_zone  $binary_remote_addr zone=req_per_ip:10m  rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ---- Default server: reject any request whose Host/SNI isn't the canonical
# domain (direct-IP scans, Host-header injection). 444 closes the connection
# with no response; a cert is still required to finish the TLS handshake before
# nginx can see (and reject) the SNI.
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/waygerz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/waygerz.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    return 444;
}

# ---- HTTP: serve the ACME http-01 challenge, redirect everything else to HTTPS
# (literal domain in the target so a spoofed Host can't make this an open
# redirect).
server {
    listen 80;
    server_name waygerz.com;

    # certbot --webroot drops files here; must be reachable over plain HTTP for
    # both initial issuance and renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://waygerz.com$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name waygerz.com;

    ssl_certificate     /etc/letsencrypt/live/waygerz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/waygerz.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    # PFS-only AEAD suites (Mozilla "intermediate"). ssl_ciphers is ignored for
    # TLS 1.3 (its suite set is fixed) and applies only to TLS 1.2.
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — force HTTPS for two years incl. subdomains. `always` so it rides
    # error responses too. Add `preload` only if submitting to the HSTS preload
    # list. Cheap clickjacking / MIME-sniff / referrer-leak defenses below.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Per-IP request + connection caps (zones above). burst=60 nodelay absorbs a
    # page-load fan-out without queueing; sustained 30r/s. 429 (not the default
    # 503) so a throttled client is unambiguous.
    limit_req         zone=req_per_ip burst=60 nodelay;
    limit_conn        conn_per_ip 50;
    limit_req_status  429;
    limit_conn_status 429;

    client_max_body_size 4m;

    # ---- Shared proxy headers. Authorization (the JWT) is forwarded by default;
    # services verify it themselves. X-Forwarded-Proto lets Flask build https
    # URLs and set Secure cookies behind the TLS-terminating gateway.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # ---- API routes. Each /api/<svc> prefix is stripped and replaced with the
    # service's own top-level prefix via the proxy_pass URI (literal prefix
    # substitution): e.g. /api/auth/login -> auth:8000/auth/login.
    # Internal-only endpoints (/internal/*, wagers /admin/*) are NOT routed here,
    # so they stay reachable only on the compose network — never from the public.

    # Versioned public API — each service mounts at /v1/{group}/{name}.
    # Tight limit on login: PINs are 4 digits.
    location = /api/v1/platform/auth/login {
        limit_req zone=req_per_ip burst=5 nodelay;
        proxy_pass http://auth:8000/v1/platform/auth/login;
    }
    location /api/v1/platform/auth/     { proxy_pass http://auth:8000/v1/platform/auth/; }
    location /api/v1/social/friends   { proxy_pass http://friends:8000/v1/social/friends; }
    location /api/v1/gameplay/wallet/   { proxy_pass http://wallet:8000/v1/gameplay/wallet/; }
    location /api/v1/gameplay/leagues   { proxy_pass http://leagues:8000/v1/gameplay/leagues; }
    location /api/v1/gameplay/contests  { proxy_pass http://contests:8000/v1/gameplay/contests; }
    location /api/v1/platform/ingestor      { proxy_pass http://ingestor:8000/v1/platform/ingestor; }
    location /api/v1/platform/media/   { proxy_pass http://media:8000/v1/platform/media/; }
    location /api/v1/social/comments   { proxy_pass http://comments:8000/v1/social/comments; }
    location /api/v1/social/messaging/ {
        proxy_pass http://messaging:8000/v1/social/messaging/;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ---- WebUI (everything else): the Next.js SSR app on :3000. No auth here
    # — the shell loads and all tenant data flows through the JWT-gated /api/*
    # routes above. Upgrade headers included for Next HMR/streaming.
    location / {
        proxy_pass http://webui:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
